    discovery_rules:
    - uuid: 2e479f6ed23f4d1a96e1abc20c7205d7
      name: BGP neighbor discovery
      type: DEPENDENT
      key: fgate.bgp.neighbor.discovery
      delay: '0'
      filter:
        evaltype: AND
        conditions:
        - macro: '{#BGP_NEIGHBOR_IP}'
          value: '{$FGATE.BGP.NEIGHBOR.MATCHES}'
          formulaid: A
        - macro: '{#BGP_NEIGHBOR_IP}'
          value: '{$FGATE.BGP.NEIGHBOR.NOT_MATCHES}'
          operator: NOT_MATCHES_REGEX
          formulaid: B
      enabled_lifetime_type: DISABLE_NEVER
      description: Discovery of BGP neighbors from FortiGate REST API.
      item_prototypes:
      - uuid: 288cdd5527aa4b408ec3ba2977f21f20
        name: 'BGP neighbor [{#BGP_NEIGHBOR_IP}]: State'
        type: DEPENDENT
        key: fgate.bgp.neighbor.state["{#BGP_NEIGHBOR_IP}"]
        delay: '0'
        history: 30d
        value_type: TEXT
        trends: '0'
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.results[?(@.neighbor_ip == "{#BGP_NEIGHBOR_IP}")].state.first()
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        master_item:
          key: fgate.bgp.get_data
        tags:
        - tag: bgp_neighbor
          value: '{#BGP_NEIGHBOR_IP}'
        - tag: component
          value: bgp
      - uuid: 43f67a0d56764cef9b6e73660e652552
        name: 'BGP neighbor [{#BGP_NEIGHBOR_IP}]: State code'
        type: DEPENDENT
        key: fgate.bgp.neighbor.state_code["{#BGP_NEIGHBOR_IP}"]
        delay: '0'
        history: 30d
        description: Numeric BGP state code for dashboards and trigger evaluation.
        valuemap:
          name: BGP neighbor state
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - 'var state = String(value || '''').toLowerCase().replace(/[-_]/g, '' '').replace(/\s+/g, '' '').trim();

            if (state === ''established'') { return 1; }

            if (state === ''idle'') { return 2; }

            if (state === ''connect'') { return 3; }

            if (state === ''active'') { return 4; }

            if (state === ''open sent'' || state === ''opensent'') { return 5; }

            if (state === ''open confirm'' || state === ''openconfirm'') { return 6; }

            return 0;

            '
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        master_item:
          key: fgate.bgp.neighbor.state["{#BGP_NEIGHBOR_IP}"]
        tags:
        - tag: bgp_neighbor
          value: '{#BGP_NEIGHBOR_IP}'
        - tag: component
          value: bgp
        trigger_prototypes:
        - uuid: d4aef06fad1b48ecaadbc63df6a97a03
          expression: '{$FGATE.BGP.MONITOR}=1 and {$FGATE.BGP.NEIGHBOR.CONTROL:"{#BGP_NEIGHBOR_IP}"}=1 and (last(/FortiGate Combined HTTP SNMP Custom/fgate.bgp.neighbor.state_code["{#BGP_NEIGHBOR_IP}"])=3 or last(/FortiGate Combined HTTP SNMP Custom/fgate.bgp.neighbor.state_code["{#BGP_NEIGHBOR_IP}"])=4)'
          name: 'BGP neighbor [{#BGP_NEIGHBOR_IP}]: Status Active or Connect'
          opdata: 'Current state: {ITEM.LASTVALUE1}'
          priority: HIGH
          description: The BGP neighbor is in Active or Connect state instead of Established.
          tags:
          - tag: scope
            value: availability
        - uuid: e579a52ea24b40cfb8d8dad26ee00439
          expression: '{$FGATE.BGP.MONITOR}=1 and {$FGATE.BGP.NEIGHBOR.CONTROL:"{#BGP_NEIGHBOR_IP}"}=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.bgp.neighbor.state_code["{#BGP_NEIGHBOR_IP}"])=2'
          name: 'BGP neighbor [{#BGP_NEIGHBOR_IP}]: Status Idle'
          opdata: 'Current state: {ITEM.LASTVALUE1}'
          priority: WARNING
          description: The BGP neighbor is in Idle state instead of Established.
          tags:
          - tag: scope
            value: availability
        - uuid: bd4e2be8dbb048f481c40a5302a9cee1
