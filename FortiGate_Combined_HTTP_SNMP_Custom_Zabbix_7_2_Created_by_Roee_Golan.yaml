    - uuid: 95b7584d75a94668ab4ca5631bb9c333
      name: IPSec tunnel discovery
      type: DEPENDENT
      key: fgate.ipsec.tunnel.discovery
      delay: '0'
      filter:
        evaltype: AND
        conditions:
        - macro: '{#IPSEC_PHASE1_NAME}'
          value: '{$FGATE.IPSEC.PHASE1.MATCHES}'
          formulaid: A
        - macro: '{#IPSEC_PHASE1_NAME}'
          value: '{$FGATE.IPSEC.PHASE1.NOT_MATCHES}'
          operator: NOT_MATCHES_REGEX
          formulaid: B
        - macro: '{#IPSEC_TUNNEL_NAME}'
          value: '{$FGATE.IPSEC.TUNNEL.MATCHES}'
          formulaid: C
        - macro: '{#IPSEC_TUNNEL_NAME}'
          value: '{$FGATE.IPSEC.TUNNEL.NOT_MATCHES}'
          operator: NOT_MATCHES_REGEX
          formulaid: D
      description: Discovery of IPSec phase-2 tunnels from the FortiGate REST API. The LLD filter supports include/exclude regex macros for phase-2/tunnel names and phase-1 names, so FortiClient/end-user/dial-up IPSec tunnels can be excluded from monitoring.
      item_prototypes:
      - uuid: 973fd26ebc944ed0a3af4bcbb65e686a
        name: 'IPSec tunnel [{#IPSEC_TUNNEL_NAME}]: Status'
        type: DEPENDENT
        key: fgate.ipsec.tunnel.status["{#IPSEC_TUNNEL_NAME}"]
        delay: '0'
        history: 90d
        value_type: TEXT
        trends: '0'
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.results[*].proxyid[?(@.p2name == "{#IPSEC_TUNNEL_NAME}")].status.first()
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        master_item:
          key: fgate.ipsec.get_data
        tags:
        - tag: component
          value: ipsec
        - tag: ipsec_phase1
          value: '{#IPSEC_PHASE1_NAME}'
        - tag: ipsec_tunnel
          value: '{#IPSEC_TUNNEL_NAME}'
      - uuid: 32459cfda6ea4e0791f3380817ae1922
        name: 'IPSec tunnel [{#IPSEC_TUNNEL_NAME}]: Status code'
        type: DEPENDENT
        key: fgate.ipsec.tunnel.status_code["{#IPSEC_TUNNEL_NAME}"]
        delay: '0'
        history: 90d
        description: Numeric IPSec tunnel status code for dashboards and trigger evaluation.
        valuemap:
          name: IPSec tunnel status
        preprocessing:
        - type: JAVASCRIPT
          parameters:
          - 'var status = String(value || '''').toLowerCase().trim();

            if (status === ''up'') { return 1; }

            if (status === ''down'') { return 0; }

            return 2;

            '
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        master_item:
          key: fgate.ipsec.tunnel.status["{#IPSEC_TUNNEL_NAME}"]
        tags:
        - tag: component
          value: ipsec
        - tag: ipsec_phase1
          value: '{#IPSEC_PHASE1_NAME}'
        - tag: ipsec_tunnel
          value: '{#IPSEC_TUNNEL_NAME}'
        trigger_prototypes:
        - uuid: 056dc0f213ea4b83900ce9961f5d73b6
          expression: '{$FGATE.IPSEC.MONITOR}=1 and {$FGATE.IPSEC.TUNNEL.CONTROL:"{#IPSEC_TUNNEL_NAME}"}=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.ipsec.tunnel.status_code["{#IPSEC_TUNNEL_NAME}"],#1)=0 and last(/FortiGate Combined HTTP SNMP Custom/fgate.ipsec.tunnel.status_code["{#IPSEC_TUNNEL_NAME}"],#2)=0'
          name: 'IPSec tunnel [{#IPSEC_TUNNEL_NAME}]: Tunnel is down'
          opdata: 'Current status: {ITEM.LASTVALUE1}'
          priority: HIGH
          description: The IPSec tunnel has reported down for two consecutive checks.
          tags:
          - tag: scope
            value: availability
      master_item:
        key: fgate.ipsec.get_data
      lld_macro_paths:
      - lld_macro: '{#IPSEC_PHASE1_NAME}'
        path: $.ipsec_phase1_name
      - lld_macro: '{#IPSEC_TUNNEL_NAME}'
        path: $.ipsec_tunnel_name
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var data = JSON.parse(value);\nvar output = [];\nvar results = Array.isArray(data.results) ? data.results : [];\n\nresults.forEach(function (phase1) {\n    var phase1Name = String(phase1.p1name || phase1.phase1name || phase1.name || phase1.vpn_name || '');\n    var proxyids = Array.isArray(phase1.proxyid) ? phase1.proxyid : [];\n\n    proxyids.forEach(function (p2) {\n        var row = {};\n        for (var key in p2) {\n            if (Object.prototype.hasOwnProperty.call(p2, key)) {\n                row[key] = p2[key];\n            }\n        }\n        row.ipsec_tunnel_name = String(p2.p2name || p2.name || '');\n        row.ipsec_phase1_name = String(p2.p1name || phase1Name || '');\n        output.push(row);\n    });\n});\n\nreturn JSON.stringify(output);\n"
    - uuid: d8b65c759c204c86900a871ffe2d545e
