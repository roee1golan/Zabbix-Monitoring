    - uuid: fbf7a83dedc843b08070330866f643d5
      name: Get BGP neighbors
      type: HTTP_AGENT
      key: fgate.bgp.get_data
      delay: 3m
      history: 1d
      value_type: TEXT
      trends: '0'
      description: Raw BGP neighbor data from FortiGate REST API.
      preprocessing:
      - type: CHECK_NOT_SUPPORTED
        parameters:
        - '-1'
        error_handler: CUSTOM_VALUE
        error_handler_params: '{"error":"Not supported value received"}'
      timeout: '{$FGATE.DATA.TIMEOUT}'
      url: '{$FGATE.SCHEME}://{$FGATE.API.FQDN}:{$FGATE.API.PORT}/api/v2/monitor/router/bgp/neighbors'
      query_fields:
      - name: vdom
        value: '{$FGATE.API.BGP.VDOM}'
      follow_redirects: 'NO'
      http_proxy: '{$FGATE.HTTP.PROXY}'
      headers:
      - name: Accept
        value: application/json
      - name: Authorization
        value: Bearer {$FGATE.API.TOKEN}
      tags:
      - tag: component
        value: bgp
      - tag: component
        value: raw
    - uuid: f96a073438fc472fb954434566730efc
      name: BGP neighbors established
      type: DEPENDENT
      key: fgate.bgp.neighbors.established
      delay: '0'
      description: Number of BGP neighbors in Established state.
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var obj = JSON.parse(value);\nvar results = Array.isArray(obj.results) ? obj.results : [];\nvar count = 0;\nresults.forEach(function (n) {\n    if (String(n.state || '').toLowerCase() === 'established') {\n        count++;\n    }\n});\nreturn count;\n"
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      master_item:
        key: fgate.bgp.get_data
      tags:
      - tag: component
        value: bgp
    - uuid: 1181041273834f78b49eab84b31a13d0
      name: BGP neighbors not established
      type: DEPENDENT
      key: fgate.bgp.neighbors.not_established
      delay: '0'
      description: Number of BGP neighbors not in Established state.
      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - "var obj = JSON.parse(value);\nvar results = Array.isArray(obj.results) ? obj.results : [];\nvar count = 0;\nresults.forEach(function (n) {\n    if (String(n.state || '').toLowerCase() !== 'established') {\n        count++;\n    }\n});\nreturn count;\n"
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 1h
      master_item:
        key: fgate.bgp.get_data
      tags:
      - tag: component
        value: bgp
    - uuid: 2cfe9bc466d94208815d550b039827c6
