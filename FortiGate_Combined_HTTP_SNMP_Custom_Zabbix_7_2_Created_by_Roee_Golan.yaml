          recovery_expression: last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0
        tags:
        - tag: scope
          value: availability
        - tag: scope
          value: performance
