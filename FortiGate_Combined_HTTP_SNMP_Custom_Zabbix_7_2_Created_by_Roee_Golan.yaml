        key: fgate.service.get_data
      lld_macro_paths:
      - lld_macro: '{#HAS_EXPIRES}'
        path: $.has_expires
      - lld_macro: '{#KEY}'
        path: $.key
      - lld_macro: '{#NAME}'
        path: $.name
      - lld_macro: '{#STATUS}'
        path: $.status
      - lld_macro: '{#TYPE}'
        path: $.type
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.lld
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
        - 6h
      overrides:
      - name: System services
        step: '1'
        filter:
          conditions:
          - macro: '{#TYPE}'
            value: ^(cloud_service_status|platform|other)$
            formulaid: A
        operations:
        - operationobject: ITEM_PROTOTYPE
          operator: LIKE
          value: ': Expiration date'
          discover: NO_DISCOVER
        - operationobject: ITEM_PROTOTYPE
          operator: LIKE
          value: ': Last attempt to update'
          discover: NO_DISCOVER
        - operationobject: ITEM_PROTOTYPE
          operator: LIKE
          value: ': Last update time'
          discover: NO_DISCOVER
        - operationobject: ITEM_PROTOTYPE
          operator: LIKE
          value: ': Service version'
          discover: NO_DISCOVER
        - operationobject: ITEM_PROTOTYPE
          operator: LIKE
          value: ': Update method'
          discover: NO_DISCOVER
        - operationobject: ITEM_PROTOTYPE
          operator: LIKE
          value: ': Update result'
          discover: NO_DISCOVER
        - operationobject: TRIGGER_PROTOTYPE
          operator: LIKE
          value: ': License expires soon'
          discover: NO_DISCOVER
        - operationobject: TRIGGER_PROTOTYPE
          operator: LIKE
