          value: '{#IFKEY}'
      - uuid: 49ae7f4c51c54a2fbcb47275b3611de7
        name: 'Interface [{#IFNAME}({#IFALIAS})]: Link status'
        type: DEPENDENT
        key: fgate.netif.status[{#IFKEY}]
        delay: '0'
        description: Current link status of the interface.
        valuemap:
          name: Link state
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.link
        - type: BOOL_TO_DECIMAL
          parameters:
          - ''
        master_item:
          key: fgate.netif.get_data[{#IFKEY}]
        tags:
        - tag: component
          value: network
        - tag: description
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFKEY}'
        trigger_prototypes:
        - uuid: 782407b3210c4d4589fc42f07b5e2cbc
          expression: '{$NET.IF.CONTROL:"{#IFNAME}"}=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.status[{#IFKEY}])=0 and (last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.status[{#IFKEY}],#1)<>last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.status[{#IFKEY}],#2))'
          recovery_mode: RECOVERY_EXPRESSION
          recovery_expression: last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.status[{#IFKEY}])<>0 or {$NET.IF.CONTROL:"{#IFNAME}"}=0
          name: 'Interface [{#IFNAME}({#IFALIAS})]: Link down'
          opdata: 'Current status: {ITEM.LASTVALUE1}'
          priority: AVERAGE
          description: 'This trigger expression works as follows:

            1. It can be triggered if the interface link status is down.

            2. `{$NET.IF.CONTROL:"{#IFNAME}"}=1` - a user can redefine context macro to value - 0. That marks this interface as not important. No new trigger will be fired if this interface link is down.

            3. `{TEMPLATE_NAME:METRIC.diff()}=1` - the trigger fires only if the interface link status was up to (1) sometime before.


            WARNING: If closed manually, it will not fire again on the next poll because of .diff.

            '
          manual_close: 'YES'
          tags:
          - tag: scope
            value: availability
      - uuid: edf9e045f85845e1854b104cd8f55a3e
        name: 'Interface [{#IFNAME}({#IFALIAS})]: Interface type'
        type: DEPENDENT
        key: fgate.netif.type[{#IFKEY}]
        delay: '0'
        description: Type of the interface.
        valuemap:
          name: Interface type
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.type
        - type: JAVASCRIPT
          parameters:
          - "const idx = [\n\t'physical',\n\t'vlan',\n\t'aggregate',\n\t'redundant',\n\t'tunnel',\n\t'vdom-link',\n\t'loopback',\n \t'switch',\n\t'vap-switch',\n\t'wl-mesh',\n\t'fext-wan',\n\t'vxlan',\n\t'geneve',\n\t'hdlc',\n\t'switch-vlan',\n \t'emac-vlan',\n\t'ssl',\n\t'lan-extension'\n].indexOf(value);\nreturn idx !== -1 ? idx : 30;\n"
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        master_item:
          key: fgate.netif.get_data[{#IFKEY}]
        tags:
        - tag: component
          value: network
        - tag: description
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFKEY}'
      trigger_prototypes:
      - uuid: 6ac92eb06dbd4320b81001b76e6c331c
        expression: change(/FortiGate Combined HTTP SNMP Custom/fgate.netif.speed[{#IFKEY}])<0 and last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.speed[{#IFKEY}])>0  and last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.status[{#IFKEY}])<>0
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: (change(/FortiGate Combined HTTP SNMP Custom/fgate.netif.speed[{#IFKEY}])>0 and last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.speed[{#IFKEY}],#2)>0)  or last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.status[{#IFKEY}])=0
        name: 'Interface [{#IFNAME}({#IFALIAS})]: Ethernet has changed to lower speed than it was before'
        opdata: 'Current reported speed: {ITEM.LASTVALUE1}'
        priority: INFO
        description: This Ethernet connection has transitioned down from its known maximum speed. This might be a sign of autonegotiation issues. Acknowledge to close the problem manually.
        manual_close: 'YES'
        dependencies:
        - name: 'Interface [{#IFNAME}({#IFALIAS})]: Link down'
          expression: '{$NET.IF.CONTROL:"{#IFNAME}"}=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.status[{#IFKEY}])=0 and (last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.status[{#IFKEY}],#1)<>last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.status[{#IFKEY}],#2))'
          recovery_expression: last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.status[{#IFKEY}])<>0 or {$NET.IF.CONTROL:"{#IFNAME}"}=0
        tags:
        - tag: scope
          value: performance
      - uuid: 8a3952eb11754fec9af89d3f8a8188d6
        expression: (avg(/FortiGate Combined HTTP SNMP Custom/fgate.netif.in[{#IFKEY}],15m)>({$NET.IF.UTIL.MAX:"{#IFNAME}"}/100)*last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.speed[{#IFKEY}]) or  avg(/FortiGate Combined HTTP SNMP Custom/fgate.netif.out[{#IFKEY}],15m)>({$NET.IF.UTIL.MAX:"{#IFNAME}"}/100)*last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.speed[{#IFKEY}]))  and last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.speed[{#IFKEY}])>0
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: avg(/FortiGate Combined HTTP SNMP Custom/fgate.netif.in[{#IFKEY}],15m)<(({$NET.IF.UTIL.MAX:"{#IFNAME}"}-3)/100)*last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.speed[{#IFKEY}])  and avg(/FortiGate Combined HTTP SNMP Custom/fgate.netif.out[{#IFKEY}],15m)<(({$NET.IF.UTIL.MAX:"{#IFNAME}"}-3)/100)*last(/FortiGate Combined HTTP SNMP Custom/fgate.netif.speed[{#IFKEY}])
        name: 'Interface [{#IFNAME}({#IFALIAS})]: High bandwidth usage'
        event_name: 'Interface [{#IFNAME}({#IFALIAS})]: High bandwidth usage (>{$NET.IF.UTIL.MAX:"{#IFNAME}"}%)'
        opdata: 'In: {ITEM.LASTVALUE1}, out: {ITEM.LASTVALUE3}, speed: {ITEM.LASTVALUE2}'
        priority: WARNING
        description: The utilization of the network interface is close to its estimated maximum bandwidth.
        manual_close: 'YES'
        dependencies:
