  triggers:
  - uuid: e248cf7aeade4d5fb33a09184b24596a
    expression: '{$FGATE.HA.MONITOR}=1 and {$FGATE.HA.SYNC.CONTROL}=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.enabled)=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.sync.status)=0'
    recovery_mode: RECOVERY_EXPRESSION
    recovery_expression: last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.enabled)=0 or last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.sync.status)<>0 or {$FGATE.HA.MONITOR}=0 or {$FGATE.HA.SYNC.CONTROL}=0
    name: FortiGate HA cluster is out of sync
    opdata: 'Current sync state: {ITEM.LASTVALUE1}'
    priority: HIGH
    description: At least one HA member reports an out-of-sync state.
    tags:
    - tag: scope
      value: availability
  - uuid: 2a6bfaa65e074ae8b2db090365f96c9b
    expression: '{$FGATE.HA.MONITOR}=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.enabled)=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.members.count)<>{$FGATE.HA.EXPECTED.MEMBERS}'
    recovery_mode: RECOVERY_EXPRESSION
    recovery_expression: last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.enabled)=0 or last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.members.count)={$FGATE.HA.EXPECTED.MEMBERS} or {$FGATE.HA.MONITOR}=0
    name: FortiGate HA cluster member count does not match expected
    opdata: 'Current members: {ITEM.LASTVALUE1}; expected: {$FGATE.HA.EXPECTED.MEMBERS}'
    priority: HIGH
    description: The number of discovered HA members differs from {$FGATE.HA.EXPECTED.MEMBERS}. This can indicate that the secondary FortiGate is missing/offline or that the expected member count macro needs adjustment.
    tags:
    - tag: scope
      value: availability
  - uuid: ea896897dd5444b1b07f1b0f0220e185
    expression: '{$FGATE.HA.MONITOR}=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.enabled)=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.failover.ready)=3'
    recovery_mode: RECOVERY_EXPRESSION
    recovery_expression: last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.enabled)=0 or last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.failover.ready)<>3 or {$FGATE.HA.MONITOR}=0
    name: FortiGate HA failover readiness is unknown
    opdata: 'Readiness: {ITEM.LASTVALUE1}'
    priority: WARNING
    description: Zabbix could not determine HA failover readiness from the FortiGate HA API data.
    tags:
    - tag: scope
      value: availability
  - uuid: 6ff61b1919b941298224251dee69957e
    expression: '{$FGATE.HA.MONITOR}=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.enabled)=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.failover.ready)=0'
    recovery_mode: RECOVERY_EXPRESSION
    recovery_expression: last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.enabled)=0 or last(/FortiGate Combined HTTP SNMP Custom/fgate.ha.failover.ready)<>0 or {$FGATE.HA.MONITOR}=0
    name: FortiGate HA failover readiness problem
    opdata: 'Readiness: {ITEM.LASTVALUE1}'
    priority: HIGH
    description: 'The HA cluster should be considered risky for failover because at least one readiness condition failed: member count, member state, or sync/checksum state.'
    tags:
    - tag: scope
      value: availability
