zabbix_export:
  version: '7.2'
  template_groups:
  - uuid: 77837494e91b4282868c74912b55712f
    name: Templates/Network devices
  templates:
  - uuid: e6dc80526f384f728e665a08ee86ed72
    template: FortiGate Combined HTTP SNMP Custom
    name: FortiGate Combined by HTTP and SNMP - Custom
    description: 'The template for monitoring FortiGate Next Generation Firewall by HTTP.

      Fixed for FortiOS 7.4.5 / 7.6.1 and later.


      1. On the FortiGate GUI, select System > Admin Profiles > Create New.

      2. Enter a profile name (ex. zabbix_ro) and enable all the Read permissions. Please note the profile name, it will be used a bit later.

      3. Go to System > Administrators > Create New > REST API Admin.

      4. Enter the API-user''s name and select the profile name you created in step 2.

      5. The trusted host can be specified to ensure that only Zabbix server can reach the FortiGate.

      6. Click OK and an API token will be generated. Make a note of the API token as it''s only shown once and cannot be retrieved.

      7. Put the API token into {$FGATE.API.TOKEN} macro.

      8. Set your FortiGate GUI IP/FQDN as {$FGATE.API.FQDN} macro value.

      9. FortiGate REST API should use HTTPS. Leave "{$FGATE.SCHEME}" as "https" unless you have a legacy exception.

      10. If FortiGate GUI/API uses the default HTTPS port, leave {$FGATE.API.PORT} as "443".

      11. If FortiGate GUI/API port differs from the standard one, specify it in {$FGATE.API.PORT} macro.

      12. This template sends the API token in the Authorization header ("Bearer <token>"), which is recommended for current FortiOS versions.


      You can discuss this template or leave feedback on our forum https://www.zabbix.com/forum/zabbix-suggestions-and-feedback.


      Generated by official Zabbix template tool "Templator"



      Custom extension: HA cluster monitoring via FortiOS REST API. Adds HA member discovery, per-member items/triggers, and an HA diagnostics dashboard while keeping existing FortiGate monitoring items unchanged.


      Custom extension: BGP neighbor, IPSec tunnel, and hardware sensor alarm monitoring via FortiOS REST API with integrated dashboards.


      Custom combined template for Zabbix 7.2.

      Created By Roee Golan


      Design note: FortiGate Combined HTTP SNMP Custom is the primary source. SNMPv3 is added only as supplemental coverage for interface counters and selected SNMP-only metrics.'
    vendor:
      name: Roee Golan / Custom from Zabbix official templates
      version: 7.2-custom
    groups:
    - name: Templates/Network devices
    items:
    - uuid: a7bc30557a554293879df783b8253574
      name: API availability status
      type: DEPENDENT
      key: fgate.api.status
      delay: '0'
      description: Checking API availability by response.
      valuemap:
        name: Service state
      preprocessing:
      - type: JSONPATH
        parameters:
        - $.build
        error_handler: CUSTOM_VALUE
        error_handler_params: '0'
      - type: IN_RANGE
        parameters:
        - ''
        - '0'
        error_handler: CUSTOM_VALUE
        error_handler_params: '1'
      master_item:
        key: fgate.system.get_data
      tags:
      - tag: component
        value: health
      - tag: component
        value: network
      triggers:
      - uuid: 1e2faa4a8d014a458c5a01017c3ab33e
        expression: last(/FortiGate Combined HTTP SNMP Custom/fgate.api.status)=0
        name: Unexpected response from API
        priority: AVERAGE
        description: Received an unexpected response from API. It may be unavailable.
        dependencies:
        - name: Port {$FGATE.API.PORT} is unavailable
          expression: last(/FortiGate Combined HTTP SNMP Custom/net.tcp.service["{$FGATE.SCHEME}","{$FGATE.API.FQDN}","{$FGATE.API.PORT}"])=0
        tags:
        - tag: scope
          value: availability
