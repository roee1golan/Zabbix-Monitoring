          value: raw
        - tag: service
          value: '{#KEY}'
      - uuid: d50013f40f0a46ceb64a0cb92917ae7a
        name: 'Service [{#NAME}]: License status'
        type: DEPENDENT
        key: fgate.service.license["{#KEY}"]
        delay: '0'
        description: Current license status of the {#NAME} service.
        valuemap:
          name: License status
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.status
          error_handler: DISCARD_VALUE
        - type: JAVASCRIPT
          parameters:
          - "const idx = [\n\t'cloud_logged_in',\n\t'licensed',\n\t'registered',\n\t'vm_eval',\n\t'free_license',\n\t'vm_valid',\n \t'cloud_confirm_email',\n\t'cloud_error',\n\t'cloud_logged_out',\n\t'cloud_login_in_progress',\n\t'expired',\n \t'expires_soon',\n\t'free_license_exhausted',\n\t'licensed_exhausted',\n\t'no_license',\n\t'no_support',\n\t 'not_registered',\n\t'pending',\n\t'unavailable',\n\t'update_manual',\n\t'update_push',\n\t'update_sched',\n\t 'vm_eval_expired',\n\t'vm_expired',\n\t'vm_expires_soon',\n\t'vm_grace_period',\n\t'vm_invalid',\n\t'vm_pending',\n \t'vm_validation_overdue',\n].indexOf(value);\nreturn idx !== -1 ? idx : 30;\n"
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        master_item:
          key: fgate.service.get_data["{#KEY}"]
        tags:
        - tag: component
          value: service
        - tag: name
          value: '{#KEY}'
        trigger_prototypes:
        - uuid: 098712014789491f9b567dc46908556c
          expression: '{$SERVICE.LICENSE.CONTROL:"{#KEY}"}=1 and last(/FortiGate Combined HTTP SNMP Custom/fgate.service.license["{#KEY}"])>5'
          name: 'Service [{#NAME}]: License status is unsuccessful'
          event_name: 'Service [{#NAME}]: License status is {ITEM.LASTVALUE1}'
          opdata: 'Current status: {ITEM.LASTVALUE1}'
          priority: AVERAGE
          description: 'This trigger expression works as follows:

            1. It can be triggered if the license status is unsuccessful.

            2. `{$SERVICE.LICENSE.CONTROL:"{#KEY}"}=1` - a user can redefine context macro to value - 0. That marks the license of this service as not important. No new trigger will be fired if this license is unsuccessful.

            '
          manual_close: 'YES'
          tags:
          - tag: scope
            value: notice
      - uuid: ce6a99e7412246d0a173ddaa4815a9a0
        name: 'Service [{#NAME}]: Service type'
