        - tag: interface
          value: '{#IFNAME}'
      - uuid: 8ab93b614df84a7ea6c93d23ae02b1e9
        name: 'SNMP Interface {#IFNAME}({#IFALIAS}): Speed'
        type: DEPENDENT
        key: net.if.speed[ifHighSpeed.{#SNMPINDEX}]
        units: bps
        description: 'MIB: IF-MIB

          An estimate of the interface''s current bandwidth in units of 1,000,000 bits per second.

          If this object reports a value of `n`, then the speed of the interface is somewhere in the range of `n-500,000` to `n+499,999`.

          For interfaces which do not vary in bandwidth or for those where no accurate estimation can be made, this object should contain the nominal bandwidth.

          For a sub-layer which has no concept of bandwidth, this object should be zero.

          '
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.2.1.31.1.1.1.15.{#SNMPINDEX}
          - '0'
        - type: MULTIPLIER
          parameters:
          - '1000000'
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        master_item:
          key: net.if.walk
        tags:
        - tag: component
          value: network
        - tag: description
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFNAME}'
      - uuid: a0c7ef9369644ffa84ac1eb13864e6f1
        name: 'SNMP Interface {#IFNAME}({#IFALIAS}): Operational status'
        type: DEPENDENT
        key: net.if.status[ifOperStatus.{#SNMPINDEX}]
        description: 'MIB: IF-MIB

          The current operational state of the interface.

          - The `testing(3)` state indicates that no operational packets can be passed.

          - If `ifAdminStatus` is `down(2)`, then `ifOperStatus` should be `down(2)`.

          - If `ifAdminStatus` is changed to `up(1)`, then `ifOperStatus` should change to `up(1)` if the interface is ready to transmit and receive network traffic.

          - It should change to `dormant(5)` if the interface is waiting for external actions (such as a serial line waiting for an incoming connection).

          - It should remain in the `down(2)` state if and only if there is a fault that prevents it from going to the `up(1)` state.

          - It should remain in the `notPresent(6)` state if the interface has missing (typically, hardware) components.

          '
        valuemap:
          name: SNMP Interface status
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.2.1.2.2.1.8.{#SNMPINDEX}
          - '0'
        master_item:
          key: net.if.walk
        tags:
        - tag: component
          value: network
        - tag: description
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFNAME}'
        trigger_prototypes:
        - uuid: d28801721c62497f930ec6da3e3b4d91
          expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
          recovery_mode: RECOVERY_EXPRESSION
          recovery_expression: last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0
          name: 'FortiGate: Interface {#IFNAME}({#IFALIAS}): Link down'
          opdata: 'Current state: {ITEM.LASTVALUE1}'
          priority: AVERAGE
          description: 'This trigger expression works as follows:

            1. It can be triggered if the operations status is down.

            2. `{$IFCONTROL:"{#IFNAME}"}=1` - a user can redefine the context macro to "0", marking this interface as not important. No new trigger will be fired if this interface is down.

            3. `{TEMPLATE_NAME:METRIC.diff()}=1` - the trigger fires only if the operational status was up to "1" sometime before.


            WARNING: if closed manually - it will not fire again on the next poll, because of `.diff`.

            '
          manual_close: 'YES'
          tags:
          - tag: scope
            value: availability
      - uuid: 63cb9bc5639b4d8eb014f96d5d4dfda9
        name: 'SNMP Interface {#IFNAME}({#IFALIAS}): Interface type'
        type: DEPENDENT
        key: net.if.type[ifType.{#SNMPINDEX}]
        trends: '0'
        description: 'MIB: IF-MIB

          The type of interface.

          Additional values for `ifType` are assigned by the Internet Assigned Numbers Authority (IANA) through updating the syntax of the IANAifType textual convention.

          '
        valuemap:
          name: SNMP Interface type
        preprocessing:
        - type: SNMP_WALK_VALUE
          parameters:
          - 1.3.6.1.2.1.2.2.1.3.{#SNMPINDEX}
          - '0'
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1d
        master_item:
          key: net.if.walk
        tags:
        - tag: component
          value: network
        - tag: description
          value: '{#IFALIAS}'
        - tag: interface
          value: '{#IFNAME}'
      trigger_prototypes:
      - uuid: 735739435c7d45bcbb3d66334fa4af3d
        expression: 'change(/FortiGate Combined HTTP SNMP Custom/net.if.speed[ifHighSpeed.{#SNMPINDEX}])<0 and last(/FortiGate Combined HTTP SNMP Custom/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0 and (

          last(/FortiGate Combined HTTP SNMP Custom/net.if.type[ifType.{#SNMPINDEX}])=6 or

          last(/FortiGate Combined HTTP SNMP Custom/net.if.type[ifType.{#SNMPINDEX}])=7 or

          last(/FortiGate Combined HTTP SNMP Custom/net.if.type[ifType.{#SNMPINDEX}])=11 or

          last(/FortiGate Combined HTTP SNMP Custom/net.if.type[ifType.{#SNMPINDEX}])=62 or

          last(/FortiGate Combined HTTP SNMP Custom/net.if.type[ifType.{#SNMPINDEX}])=69 or

          last(/FortiGate Combined HTTP SNMP Custom/net.if.type[ifType.{#SNMPINDEX}])=117

          ) and (last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2)

          '
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: "(change(/FortiGate Combined HTTP SNMP Custom/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0 and \nlast(/FortiGate Combined HTTP SNMP Custom/net.if.speed[ifHighSpeed.{#SNMPINDEX}],#2)>0) or\n(last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}])=2)\n"
        name: 'SNMP Interface {#IFNAME}({#IFALIAS}): Ethernet has changed to lower speed than it was before'
        opdata: 'Current reported speed: {ITEM.LASTVALUE1}'
        priority: INFO
        description: This Ethernet connection has transitioned down from its known maximum speed. This might be a sign of autonegotiation issues. Acknowledge to close the problem manually.
        manual_close: 'YES'
        dependencies:
        - name: 'FortiGate: Interface {#IFNAME}({#IFALIAS}): Link down'
          expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
          recovery_expression: last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0
        tags:
        - tag: scope
          value: performance
      - uuid: b67d0a77e23349a6b75748cd9b63299b
        expression: "(avg(/FortiGate Combined HTTP SNMP Custom/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)>({$IF.UTIL.MAX:\"{#IFNAME}\"}/100)*last(/FortiGate Combined HTTP SNMP Custom/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) or \navg(/FortiGate Combined HTTP SNMP Custom/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)>({$IF.UTIL.MAX:\"{#IFNAME}\"}/100)*last(/FortiGate Combined HTTP SNMP Custom/net.if.speed[ifHighSpeed.{#SNMPINDEX}])) and \nlast(/FortiGate Combined HTTP SNMP Custom/net.if.speed[ifHighSpeed.{#SNMPINDEX}])>0\n"
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: "avg(/FortiGate Combined HTTP SNMP Custom/net.if.in[ifHCInOctets.{#SNMPINDEX}],15m)<(({$IF.UTIL.MAX:\"{#IFNAME}\"}-3)/100)*last(/FortiGate Combined HTTP SNMP Custom/net.if.speed[ifHighSpeed.{#SNMPINDEX}]) and \navg(/FortiGate Combined HTTP SNMP Custom/net.if.out[ifHCOutOctets.{#SNMPINDEX}],15m)<(({$IF.UTIL.MAX:\"{#IFNAME}\"}-3)/100)*last(/FortiGate Combined HTTP SNMP Custom/net.if.speed[ifHighSpeed.{#SNMPINDEX}])\n"
        name: 'SNMP Interface {#IFNAME}({#IFALIAS}): High bandwidth usage'
        event_name: 'FortiGate: Interface {#IFNAME}({#IFALIAS}): High bandwidth usage (>{$IF.UTIL.MAX:"{#IFNAME}"}%)'
        opdata: 'In: {ITEM.LASTVALUE1}, out: {ITEM.LASTVALUE3}, speed: {ITEM.LASTVALUE2}'
        priority: WARNING
        description: The utilization of the network interface is close to its estimated maximum bandwidth.
        manual_close: 'YES'
        dependencies:
        - name: 'FortiGate: Interface {#IFNAME}({#IFALIAS}): Link down'
          expression: '{$IFCONTROL:"{#IFNAME}"}=1 and last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}])=2 and (last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}],#1)<>last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}],#2))'
          recovery_expression: last(/FortiGate Combined HTTP SNMP Custom/net.if.status[ifOperStatus.{#SNMPINDEX}])<>2 or {$IFCONTROL:"{#IFNAME}"}=0
        tags:
        - tag: scope
          value: performance
      - uuid: fcdca51768664401bf40cf1a2b42cdf7
        expression: 'min(/FortiGate Combined HTTP SNMP Custom/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}

          or min(/FortiGate Combined HTTP SNMP Custom/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)>{$IF.ERRORS.WARN:"{#IFNAME}"}

          '
        recovery_mode: RECOVERY_EXPRESSION
        recovery_expression: 'max(/FortiGate Combined HTTP SNMP Custom/net.if.in.errors[ifInErrors.{#SNMPINDEX}],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8

          and max(/FortiGate Combined HTTP SNMP Custom/net.if.out.errors[ifOutErrors.{#SNMPINDEX}],5m)<{$IF.ERRORS.WARN:"{#IFNAME}"}*0.8

          '
        name: 'SNMP Interface {#IFNAME}({#IFALIAS}): High error rate'
        event_name: 'FortiGate: Interface {#IFNAME}({#IFALIAS}): High error rate (>{$IF.ERRORS.WARN:"{#IFNAME}"} for 5m)'
        opdata: 'errors in: {ITEM.LASTVALUE1}, errors out: {ITEM.LASTVALUE2}'
