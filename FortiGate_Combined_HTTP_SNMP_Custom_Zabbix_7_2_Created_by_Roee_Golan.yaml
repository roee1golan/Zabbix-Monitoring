      preprocessing:
      - type: JAVASCRIPT
        parameters:
        - 'var obj = JSON.parse(value);

          var results = Array.isArray(obj.results) ? obj.results : [];

          return results.length;

          '
      - type: DISCARD_UNCHANGED_HEARTBEAT
        parameters:
