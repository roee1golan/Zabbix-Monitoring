          operator: NOT_MATCHES_REGEX
          formulaid: D
        - macro: '{#TYPE}'
          value: '{$SERVICE.TYPE.MATCHES}'
          formulaid: E
        - macro: '{#TYPE}'
          value: '{$SERVICE.TYPE.NOT_MATCHES}'
          operator: NOT_MATCHES_REGEX
          formulaid: F
      description: Discovery for FortiGate services.
      item_prototypes:
      - uuid: 155119cbfce44f9ba7abede608994cf0
        name: 'Service [{#NAME}]: Expiration date'
        type: DEPENDENT
        key: fgate.service.expire["{#KEY}"]
        delay: '0'
        units: unixtime
        description: Expiration date for the license of the current service.
        preprocessing:
        - type: JSONPATH
          parameters:
          - $.expires
          error_handler: DISCARD_VALUE
        - type: DISCARD_UNCHANGED_HEARTBEAT
          parameters:
          - 1h
        master_item:
          key: fgate.service.get_data["{#KEY}"]
        tags:
        - tag: component
          value: service
        - tag: name
          value: '{#KEY}'
        trigger_prototypes:
        - uuid: 5903f65181484bb581e0b1d8b8fe411a
          expression: '{$SERVICE.LICENSE.CONTROL:"{#KEY}"}=1 and (last(/FortiGate Combined HTTP SNMP Custom/fgate.service.expire["{#KEY}"]) - now()) / 86400 < {$SERVICE.EXPIRY.WARN:"{#KEY}"} and last(/FortiGate Combined HTTP SNMP Custom/fgate.service.expire["{#KEY}"]) > now()'
          name: 'Service [{#NAME}]: License expires soon'
          event_name: 'Service [{#NAME}]: License expires soon (less than {$SERVICE.EXPIRY.WARN:"{#KEY}"} days)'
          opdata: 'Current expiration date: {ITEM.LASTVALUE1}'
          priority: WARNING
          description: 'This trigger expression works as follows:

            1. It can be triggered if the license expires soon.

            2. `{$SERVICE.LICENSE.CONTROL:"{#KEY}"}=1` - a user can redefine context macro to value - 0. That marks the license of this service as not important. No new trigger will be fired if this license expires.

            '
          manual_close: 'YES'
          tags:
          - tag: scope
            value: notice
      - uuid: 8fe183eddd3e4440a7afb035f440a197
        name: 'Service [{#NAME}]: Get data'
        type: DEPENDENT
        key: fgate.service.get_data["{#KEY}"]
        delay: '0'
        history: '0'
        value_type: TEXT
        trends: '0'
        description: Item for gathering data about license for the {#NAME} service.
        preprocessing:
        - type: JSONPATH
